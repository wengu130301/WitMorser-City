<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>第一章 · 觉醒 · 古城</title>
    <style>
        /* ============================================================
                   完整样式（与之前一致）
                   ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Noto Serif SC', 'PingFang SC', 'Microsoft YaHei', serif;
            background: #0b0e14;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #story-scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 800;
            background: #0b0e14;
            opacity: 1;
            visibility: visible;
        }
        #story-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 0.8s ease, filter 1s ease;
            opacity: 1;
            z-index: 0;
            background-color: #0b0e14;
        }
        #story-bg.blur {
            filter: blur(8px);
        }
        #character-layer {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            width: 260px;
            max-height: 60%;
            object-fit: contain;
            pointer-events: none;
            opacity: 0;
            transition: left 1s ease, bottom 1s ease, opacity 1.2s ease;
            animation: none;
        }
        #character-layer.loaded {
            opacity: 0.85;
            animation: floatCharacter 3.5s ease-in-out infinite;
        }
        #character-layer.awaken {
            left: 3% !important;
            transform: translateX(0) !important;
            bottom: 18%;
            width: 320px;
            opacity: 0.95;
            animation: floatCharacterLeft 3.5s ease-in-out infinite;
        }
        @keyframes floatCharacter {
            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(-10px);
            }
        }
        @keyframes floatCharacterLeft {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        #character-layer-right {
            position: absolute;
            bottom: 22%;
            right: 3%;
            z-index: 1;
            width: 280px;
            max-height: 55%;
            object-fit: contain;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease;
            animation: none;
            transform: scaleX(-1) translateX(0);
        }
        #character-layer-right.show {
            opacity: 0.9;
            animation: floatCharacterRight 3.5s ease-in-out infinite;
        }
        @keyframes floatCharacterRight {
            0%,
            100% {
                transform: scaleX(-1) translateY(0);
            }
            50% {
                transform: scaleX(-1) translateY(-10px);
            }
        }
        #story-scene::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(to top, rgba(10, 14, 26, 0.78) 0%, transparent 100%);
            pointer-events: none;
            z-index: 1;
        }
        #story-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 30px 28px 50px 28px;
            z-index: 2;
            max-height: 55%;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            cursor: pointer;
            transition: all 0.8s ease;
        }
        #story-panel::-webkit-scrollbar {
            width: 3px;
        }
        #story-panel::-webkit-scrollbar-track {
            background: transparent;
        }
        #story-panel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }
        #story-panel.awaken {
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(4px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px 28px 30px 28px;
            max-height: 45%;
        }
        #speaker-label {
            display: none;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 215, 150, 0.9);
            letter-spacing: 2px;
            margin-bottom: 4px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
            transition: color 0.3s ease;
        }
        #story-panel.awaken #speaker-label {
            display: block;
        }
        #story-panel.awaken .story-line {
            background: rgba(255, 255, 255, 0.08);
            padding: 8px 16px;
            border-radius: 12px;
            border-left: 3px solid rgba(255, 215, 150, 0.3);
            margin-bottom: 2px;
            backdrop-filter: blur(2px);
        }
        #story-panel.awaken .story-line.show {
            background: rgba(255, 255, 255, 0.12);
        }
        #story-panel.awaken .story-line.speaker-yandong {
            border-left-color: rgba(150, 200, 255, 0.5);
        }
        #story-panel.awaken .story-line.speaker-yunling {
            border-left-color: rgba(200, 220, 255, 0.6);
        }
        #story-panel.awaken .story-line.speaker-mukaska {
            border-left-color: rgba(255, 100, 100, 0.6);
        }
        #story-chapter-label {
            font-size: 12px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
        }
        #story-lines {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 60px;
        }
        .story-line {
            font-size: 17px;
            line-height: 1.9;
            color: rgba(255, 255, 255, 0.92);
            text-shadow: 0 2px 16px rgba(0, 0, 0, 0.6);
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            letter-spacing: 0.5px;
            font-weight: 400;
            padding: 2px 0;
        }
        .story-line.show {
            opacity: 1;
            transform: translateY(0);
        }
        #choice-area {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-top: 12px;
        }
        #choice-area.show {
            display: flex;
        }
        .choice-btn {
            padding: 10px 20px;
            border: 1px solid rgba(255, 215, 150, 0.3);
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(4px);
            color: rgba(255, 255, 255, 0.85);
            font-size: 16px;
            font-family: 'Noto Serif SC', serif;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-align: center;
        }
        .choice-btn:hover {
            background: rgba(255, 215, 150, 0.15);
            border-color: rgba(255, 215, 150, 0.6);
            transform: scale(1.02);
        }
        #story-footer {
            position: absolute;
            bottom: 16px;
            left: 0;
            width: 100%;
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            padding: 0 20px;
            pointer-events: none;
        }
        #story-progress {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 2px;
            font-weight: 300;
            pointer-events: none;
        }
        #story-ctrl-btn {
            pointer-events: auto;
            padding: 7px 28px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-family: 'Noto Serif SC', serif;
            cursor: pointer;
            transition: all 0.4s ease;
            letter-spacing: 2px;
            opacity: 0;
            visibility: hidden;
        }
        #story-ctrl-btn.show {
            opacity: 1;
            visibility: visible;
        }
        #story-ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
        }
        #story-ctrl-btn.next-chapter {
            color: rgba(255, 215, 150, 0.7);
            border-color: rgba(255, 215, 150, 0.2);
        }
        #transition-tip {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            color: rgba(255, 255, 255, 0.6);
            font-size: 18px;
            letter-spacing: 4px;
            text-shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
            background: rgba(0, 0, 0, 0.3);
            padding: 16px 32px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
            animation: fadeInOut 2s ease forwards;
        }
        #transition-tip.show {
            display: block;
        }
        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.95);
            }
            20% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            80% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.95);
            }
        }
        #return-menu-btn {
            display: none;
            pointer-events: auto;
            padding: 10px 36px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            font-family: 'Noto Serif SC', serif;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 3px;
            margin-top: 12px;
        }
        #return-menu-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.4);
            color: #fff;
            transform: scale(1.04);
        }
        #return-menu-btn.show {
            display: inline-block;
        }
        #tap-hint {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 2px;
            font-weight: 300;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.6s ease;
            margin-top: 4px;
        }
        #tap-hint.show {
            opacity: 1;
        }

        @keyframes shakeScene {
            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }
            10% {
                transform: translate(-8px, 4px) rotate(-0.5deg);
            }
            20% {
                transform: translate(6px, -6px) rotate(0.5deg);
            }
            30% {
                transform: translate(-4px, 8px) rotate(-0.3deg);
            }
            40% {
                transform: translate(10px, -2px) rotate(0.4deg);
            }
            50% {
                transform: translate(-6px, 6px) rotate(-0.6deg);
            }
            60% {
                transform: translate(4px, -4px) rotate(0.3deg);
            }
            70% {
                transform: translate(-10px, 2px) rotate(-0.2deg);
            }
            80% {
                transform: translate(8px, -8px) rotate(0.5deg);
            }
            90% {
                transform: translate(-2px, 10px) rotate(-0.4deg);
            }
        }
        #story-scene.shaking {
            animation: shakeScene 0.6s ease-in-out 3;
        }
        #story-scene.shaking-strong {
            animation: shakeScene 0.4s ease-in-out 5;
        }
        @keyframes swayChar {
            0%,
            100% {
                transform: translateX(0) rotate(0deg);
            }
            25% {
                transform: translateX(-6px) rotate(-2deg);
            }
            75% {
                transform: translateX(6px) rotate(2deg);
            }
        }
        #character-layer.swaying {
            animation: swayChar 0.5s ease-in-out 4;
        }
        #character-layer-right.swaying {
            animation: swayChar 0.5s ease-in-out 4;
        }

        #battle-container {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(2px);
            flex-direction: column;
            padding: 10px 16px 20px 16px;
        }
        #battle-container.show {
            display: flex;
        }
        #battle-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.4;
            z-index: -1;
        }
        #battle-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            flex-wrap: wrap;
            padding: 4px 0;
            z-index: 2;
            flex-shrink: 0;
        }
        #battle-allies {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            flex: 2;
            min-width: 200px;
        }
        #battle-enemy {
            flex: 1;
            min-width: 100px;
            text-align: right;
        }
        .battle-unit {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            border-radius: 10px;
            padding: 6px 10px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            min-width: 70px;
            flex: 1;
            max-width: 140px;
            transition: all 0.3s ease;
            cursor: default;
        }
        .battle-unit.selectable {
            cursor: pointer;
            border-color: rgba(255, 215, 150, 0.2);
        }
        .battle-unit.selectable:hover {
            background: rgba(255, 215, 150, 0.12);
            border-color: rgba(255, 215, 150, 0.4);
            transform: scale(1.02);
        }
        .battle-unit.selected {
            background: rgba(255, 215, 150, 0.18);
            border-color: rgba(255, 215, 150, 0.6);
            box-shadow: 0 0 20px rgba(255, 215, 150, 0.1);
        }
        .battle-unit .unit-name {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 1px;
        }
        .battle-unit .unit-hp {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 2px;
        }
        .battle-unit .unit-hp .hp-bar {
            display: inline-block;
            width: 50px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            vertical-align: middle;
            margin-left: 4px;
        }
        .battle-unit .unit-hp .hp-bar .hp-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
            background: linear-gradient(90deg, #6bcb8a, #4ecdc4);
        }
        .battle-unit .unit-hp .hp-bar .hp-fill.low {
            background: linear-gradient(90deg, #ff6b6b, #ee5a24);
        }
        .battle-unit .unit-hp .hp-bar .hp-fill.enemy-hp {
            background: linear-gradient(90deg, #ff6b6b, #d63031);
        }
        .battle-unit.enemy-unit {
            border-color: rgba(255, 80, 80, 0.2);
            background: rgba(80, 0, 0, 0.25);
        }
        .battle-unit.enemy-unit .unit-name {
            color: rgba(255, 150, 150, 0.9);
        }
        #battle-middle {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 2;
            min-height: 100px;
            padding: 6px 0;
        }
        #battle-hand {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 8px 0;
        }
        .battle-card {
            padding: 8px 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(6px);
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 80px;
            max-width: 120px;
            flex: 1;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            font-family: 'Noto Serif SC', serif;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .battle-card .card-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: #1a2233;
        }
        .battle-card .card-name {
            font-weight: 600;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
        }
        .battle-card .card-desc {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
        }
        .battle-card.type-attack .card-avatar {
            border-color: #ff6b6b;
        }
        .battle-card.type-defend .card-avatar {
            border-color: #4ecdc4;
        }
        .battle-card.type-heal .card-avatar {
            border-color: #6bcb8a;
        }
        .battle-card.type-special .card-avatar {
            border-color: #feca57;
        }
        .battle-card:hover:not(.disabled) {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 215, 150, 0.3);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
        }
        .battle-card.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }
        #battle-log-area {
            z-index: 2;
            padding: 4px 8px;
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            min-height: 28px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            backdrop-filter: blur(4px);
            margin-top: 4px;
            flex-shrink: 0;
        }
        #battle-bottom {
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 2;
            padding: 6px 0;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        #battle-bottom .battle-action-btn {
            padding: 8px 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(6px);
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-family: 'Noto Serif SC', serif;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }
        #battle-bottom .battle-action-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
        }
        #battle-bottom .battle-action-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        #battle-select-hint {
            color: rgba(255, 255, 255, 0.25);
            font-size: 13px;
            letter-spacing: 2px;
            text-align: center;
            padding: 4px 0;
            z-index: 2;
        }
        @keyframes battleShake {
            0%,
            100% {
                transform: translate(0, 0);
            }
            10% {
                transform: translate(-6px, 4px);
            }
            20% {
                transform: translate(6px, -4px);
            }
            30% {
                transform: translate(-4px, 6px);
            }
            40% {
                transform: translate(4px, -6px);
            }
            50% {
                transform: translate(-6px, -2px);
            }
            60% {
                transform: translate(6px, 2px);
            }
            70% {
                transform: translate(-2px, 6px);
            }
            80% {
                transform: translate(2px, -6px);
            }
            90% {
                transform: translate(-4px, 2px);
            }
        }
        #story-scene.battle-shake {
            animation: battleShake 0.4s ease-in-out 4;
        }
        #character-layer.battle-sway {
            animation: swayChar 0.3s ease-in-out 6;
        }
        #character-layer-right.battle-sway {
            animation: swayChar 0.3s ease-in-out 6;
        }

        @media (max-width: 480px) {
            #story-panel {
                padding: 20px 18px 44px 18px;
            }
            #story-panel.awaken {
                padding: 16px 18px 30px 18px;
            }
            .story-line {
                font-size: 15px;
                line-height: 1.8;
            }
            #character-layer {
                width: 200px;
                bottom: 22%;
            }
            #character-layer.awaken {
                width: 260px !important;
                bottom: 20%;
                left: 2% !important;
            }
            #character-layer-right {
                width: 200px;
                bottom: 24%;
                right: 2%;
            }
            .battle-unit {
                padding: 4px 8px;
                min-width: 50px;
                max-width: 100px;
            }
            .battle-card {
                padding: 6px 10px;
                min-width: 60px;
                max-width: 100px;
                font-size: 11px;
            }
            .battle-card .card-avatar {
                width: 36px;
                height: 36px;
            }
            #battle-container {
                padding: 6px 8px 12px 8px;
            }
        }
        @media (max-width: 360px) {
            #character-layer {
                width: 160px;
                bottom: 26%;
            }
            #character-layer.awaken {
                width: 200px !important;
                bottom: 24%;
                left: 1% !important;
            }
            #character-layer-right {
                width: 150px;
                bottom: 28%;
                right: 1%;
            }
            .battle-card {
                min-width: 50px;
                max-width: 80px;
                font-size: 10px;
            }
            .battle-card .card-avatar {
                width: 30px;
                height: 30px;
            }
        }
    </style>
</head>
<body>

    <!-- 剧情场景 -->
    <div id="story-scene">
        <div id="story-bg"></div>
        <img id="character-layer" src="character/lin_xiaoning.png" alt="林小宁" />
        <img id="character-layer-right" src="" alt="右侧角色" />
        <div id="transition-tip">✦ 即将前往白墨瑟尔城 ✦</div>

        <div id="story-panel">
            <div id="story-chapter-label">✦ 序章 · 夜</div>
            <div id="speaker-label">林小宁</div>
            <div id="story-lines"></div>

            }, {

            }, {

                    '林小宁|你是……云翎？', '云翎|是的。我是这座城的守护者。', '云翎|你听到的风声，就是这座城在呼唤你。',

                ],
                isAwaken: true,
                isDialogue: true,

            }, {

                lines: [
                    '姆卡斯卡|吼——！！！',

            }, {

                lines: ['⚔️ 姆卡斯卡精灵兽来袭！', '三人合力对抗！'],
                isBattle: true,
                isAwaken: true
            }];

            // 统一标记
            CHAPTER_DATA.forEach(function(item, idx) {
                if (!item.hasOwnProperty('isDialogue')) {
                    var hasDialogue = item.lines.some(function(line) { return line.indexOf('|') !== -1; });

                }
                if (!item.hasOwnProperty('isAwaken')) {
                    item.isAwaken = false;

            // ============================================================
            //  战斗数据
            // ============================================================
            var BATTLE_DATA = {
                allies: [
                    { id: 'lin', name: '林小宁', maxHp: 30, hp: 30, shield: 0, attack: 6, icon: 'lin_xiaoning' },
                    { id: 'yandong', name: '岩咚', maxHp: 40, hp: 40, shield: 0, attack: 8, icon: 'yandong' },
                    { id: 'yunling', name: '云翎', maxHp: 25, hp: 25, shield: 0, attack: 5, icon: 'yunling' }
                ],
                enemy: {
                    id: 'mukaska',
                    name: '姆卡斯卡精灵兽',
                    maxHp: 50,
                    hp: 50,
                    shield: 0,
                    attack: 7,
                    icon: 'mukaska'
                },
                cards: [
                    { id: 'c1', name: '风刃', type: 'attack', damage: 8, desc: '造成 8 点伤害', owner: 'lin',
                        icon: 'lin_xiaoning' },
                    { id: 'c2', name: '云盾', type: 'defend', shield: 6, desc: '获得 6 点护盾', owner: 'lin',
                        icon: 'lin_xiaoning' },
                    { id: 'c7', name: '清风', type: 'attack', damage: 5, desc: '造成 5 点伤害', owner: 'lin',
                        icon: 'lin_xiaoning' },
                    { id: 'c3', name: '重击', type: 'attack', damage: 10, desc: '造成 10 点伤害', owner: 'yandong',
                        icon: 'yandong' },
                    { id: 'c4', name: '岩石护甲', type: 'defend', shield: 8, desc: '获得 8 点护盾', owner: 'yandong',
                        icon: 'yandong' },
                    { id: 'c8', name: '震荡', type: 'special', damage: 7, desc: '造成 7 点伤害', owner: 'yandong',
                        icon: 'yandong' },
                    { id: 'c5', name: '光愈', type: 'heal', heal: 8, desc: '恢复 8 点生命', owner: 'yunling',
                        icon: 'yunling' },
                    { id: 'c6', name: '净化', type: 'special', damage: 6, heal: 3, desc: '伤害 6 · 治疗 3', owner: 'yunling',
                        icon: 'yunling' },
                    { id: 'c9', name: '晨曦', type: 'heal', heal: 10, desc: '恢复 10 点生命', owner: 'yunling',
                        icon: 'yunling' }
                ]
            };

            // ============================================================
            //  DOM 引用
            // ============================================================
            var storyScene = document.getElementById('story-scene');
            var storyBg = document.getElementById('story-bg');
            var characterLayer = document.getElementById('character-layer');
            var characterRight = document.getElementById('character-layer-right');
            var storyLines = document.getElementById('story-lines');
            var storyChapter = document.getElementById('story-chapter-label');
            var storyProgress = document.getElementById('story-progress');
            var storyCtrlBtn = document.getElementById('story-ctrl-btn');
            var tapHint = document.getElementById('tap-hint');
            var storyPanel = document.getElementById('story-panel');
            var returnMenuBtn = document.getElementById('return-menu-btn');
            var speakerLabel = document.getElementById('speaker-label');
            var choiceArea = document.getElementById('choice-area');
            var transitionTip = document.getElementById('transition-tip');

            var battleContainer = document.getElementById('battle-container');
            var battleBg = document.getElementById('battle-bg');
            var battleAllies = document.getElementById('battle-allies');
            var battleEnemy = document.getElementById('battle-enemy');
            var battleHand = document.getElementById('battle-hand');
            var battleLog = document.getElementById('battle-log-area');
            var battleHint = document.getElementById('battle-select-hint');
            var battleEndTurn = document.getElementById('battle-end-turn');

            // ============================================================
            //  音频系统
            // ============================================================
            var gameAudio = null,
                battleAudio = null;

            function initAudio() {
                try {
                    gameAudio = new Audio(MUSIC_GAME);
                    gameAudio.loop = true;
                    gameAudio.volume = 0.5;
                    battleAudio = new Audio(MUSIC_BATTLE);
                    battleAudio.loop = true;
                    battleAudio.volume = 0.5;
                } catch (e) { console.warn('音频初始化失败:', e); }
            }

            function playGameMusic() {
                try {
                    if (battleAudio && !battleAudio.paused) { battleAudio.pause();
                        battleAudio.currentTime = 0; }
                    if (gameAudio) { gameAudio.currentTime = 0;
                        gameAudio.play().catch(function(e) {}); }
                } catch (e) {}
            }

            function playBattleMusic() {
                try {
                    if (gameAudio && !gameAudio.paused) { gameAudio.pause();
                        gameAudio.currentTime = 0; }
                    if (battleAudio) { battleAudio.currentTime = 0;
                        battleAudio.play().catch(function(e) {}); }
                } catch (e) {}
            }

            function stopAllAudio() {
                try {
                    if (gameAudio) { gameAudio.pause();
                        gameAudio.currentTime = 0; }
                    if (battleAudio) { battleAudio.pause();
                        battleAudio.currentTime = 0; }
                } catch (e) {}
            }

            // ============================================================
            //  状态
            // ============================================================
            var allImagesLoaded = [];
            var currentPart = 0,
                currentLine = 0,
                storyActive = false,
                isAwakened = false,
                awaitingChoice = false,
                isInBattle = false;
            var battleState = null,
                selectedAlly = null,
                battleLocked = false;

            // ============================================================
            //  工具函数
            // ============================================================
            function shuffle(arr) {
                for (var i = arr.length - 1; i > 0; i--) {
                    var j = Math.floor(Math.random() * (i + 1));
                    var temp = arr[i];
                    arr[i] = arr[j];
                    arr[j] = temp;
                }
                return arr;
            }

            function getCharacterUrl(fileName) {
                var url = CHARACTER_DIR + fileName;
                var found = allImagesLoaded.find(function(r) { return r.url === url && r.loaded; });
                return found ? url : null;
            }

            function getAvatarUrl(iconName) {
                var file = CHARACTERS[iconName];
                if (!file) return null;
                return CHARACTER_DIR + file;
            }

            // ============================================================
            //  图片加载 (修复版 - 加载失败时使用纯色背景)
            // ============================================================
            var imageLoadCache = {};

            function preloadImages() {
                var promises = [];
                for (var i = 1; i <= 10; i++) {
                    (function(index) {
                        var url = PHOTO_PREFIX + String(index).padStart(3, '0') + '.png';
                        promises.push(new Promise(function(resolve) {
                            var img = new Image();
                            img.onload = function() {
                                imageLoadCache[url] = true;
                                resolve({ index: index, url: url, loaded: true });
                            };
                            img.onerror = function() {
                                imageLoadCache[url] = false;
                                console.warn('⚠️ 图片加载失败（将使用纯色背景）:', url);
                                resolve({ index: index, url: url, loaded: false });
                            };
                            // 超时处理 (3秒)
                            var timer = setTimeout(function() {
                                imageLoadCache[url] = false;
                                console.warn('⏱️ 图片加载超时（将使用纯色背景）:', url);
                                resolve({ index: index, url: url, loaded: false });
                            }, 3000);
                            img.src = url;
                            // 如果图片已缓存，onload 会立即触发，需要清除超时
                            img.addEventListener('load', function() { clearTimeout(timer); });
                            img.addEventListener('error', function() { clearTimeout(timer); });
                        }));
                    })(i);
                }
                var charFiles = ['lin_xiaoning.png', 'yandong.png', 'yunling.png', 'mukaska.png'];
                charFiles.forEach(function(file) {
                    var url = CHARACTER_DIR + file;
                    promises.push(new Promise(function(resolve) {
                        var img = new Image();
                        img.onload = function() {
                            resolve({ type: 'character', file: file, url: url, loaded: true });
                        };
                        img.onerror = function() {
                            resolve({ type: 'character', file: file, url: url, loaded: false });
                        };
                        img.src = url;
                    }));
                });
                return Promise.all(promises).then(function(results) {
                    allImagesLoaded = results.filter(function(r) { return r.loaded; });
                    console.log('📸 已加载图片:', allImagesLoaded.length, '张');
                    return allImagesLoaded;
                });
            }

            function getImageUrl(partIndex) {
                var num = partIndex + 1;
                var padded = String(num).padStart(3, '0');
                var url = PHOTO_PREFIX + padded + '.png';
                // 检查缓存
                if (imageLoadCache[url] === true) {
                    return url;
                } else if (imageLoadCache[url] === false) {
                    return null; // 加载失败，使用纯色背景
                }
                // 如果还未缓存，尝试加载
                var found = allImagesLoaded.find(function(r) { return r.url === url && r.loaded; });
                return found ? url : null;
            }

            // ============================================================
            //  检测说话人类型
            // ============================================================
            function getSpeakerType(speaker) {
                if (speaker === '岩咚') return 'yandong';
                if (speaker === '云翎') return 'yunling';
                if (speaker === '姆卡斯卡') return 'mukaska';
                return null;
            }

            // ============================================================
            //  剧情引擎
            // ============================================================
            function startStory() {
                storyActive = true;
                currentPart = 0;
                currentLine = 0;
                isAwakened = false;
                awaitingChoice = false;
                isInBattle = false;
                battleContainer.classList.remove('show');

                characterLayer.style.opacity = '0';
                characterLayer.classList.remove('awaken');
                characterRight.classList.remove('show');
                characterRight.style.opacity = '0';
                characterRight.src = '';
                storyScene.classList.remove('shaking', 'shaking-strong');

                playGameMusic();
                showPart(0);
                storyCtrlBtn.classList.add('show');
                updateButtonState();
                tapHint.classList.add('show');
                updateProgress();
            }

            // ============================================================
            //  颜色方案 - 不同章节使用不同的渐变色
            // ============================================================
            var fallbackColors = [
                'linear-gradient(145deg, #0b1a2e, #1a2a3a)', // 夜
                'linear-gradient(145deg, #0d1f2d, #1b2f3f)', // 梦
                'linear-gradient(145deg, #0f1f2a, #1e2f3e)', // 风
                'linear-gradient(145deg, #0e1f2a, #1d2f3d)', // 光
                'linear-gradient(145deg, #0d1f2b, #1c2f3c)', // 呼唤
                'linear-gradient(145deg, #0e1f2a, #1d2f3d)', // 苏醒
                'linear-gradient(145deg, #0f1f2a, #1e2f3e)', // 岩咚
                'linear-gradient(145deg, #0d1f2b, #1c2f3c)', // 云翎
                'linear-gradient(145deg, #0b1a2e, #1a2a3a)', // 姆卡斯卡
                'linear-gradient(145deg, #0b1a2e, #1a2a3a)' // 战斗
            ];

            function showPart(partIndex) {
                var part = CHAPTER_DATA[partIndex];
                if (!part) return;

                if (part.isBattle) {
                    startBattle();
                    return;
                }

                var isAwakenPart = part.isAwaken === true;
                var rightChar = part.rightCharacter || null;
                var isShaking = part.isShaking === true;
                var shakeStrong = part.shakeStrength === 'strong';

                storyChapter.textContent = part.chapter || '✦ 序章 · 第' + (partIndex + 1) + '段';

                // 尝试加载背景图
                var imgUrl = getImageUrl(partIndex);
                if (imgUrl) {
                    storyBg.style.backgroundImage = 'url("' + imgUrl + '")';
                    storyBg.style.opacity = '1';
                    storyBg.style.backgroundColor = '#0b0e14';
                } else {
                    // 图片加载失败，使用渐变色背景
                    storyBg.style.backgroundImage = 'none';
                    storyBg.style.background = fallbackColors[partIndex] || 'linear-gradient(145deg, #0b1a2e, #1a2a3a)';
                    storyBg.style.opacity = '1';
                }

                if (isShaking) {
                    storyScene.classList.add(shakeStrong ? 'shaking-strong' : 'shaking');
                    characterLayer.classList.add('swaying');
                    if (rightChar) {
                        characterRight.classList.add('swaying');
                    }
                    setTimeout(function() {
                        storyScene.classList.remove('shaking', 'shaking-strong');
                    }, 3000);
                } else {
                    storyScene.classList.remove('shaking', 'shaking-strong');
                    characterLayer.classList.remove('swaying');
                    characterRight.classList.remove('swaying');
                }

                if (isAwakenPart) {
                    isAwakened = true;
                    storyBg.classList.add('blur');
                    characterLayer.classList.add('awaken');
                    characterLayer.style.opacity = '1';
                    storyPanel.classList.add('awaken');
                    speakerLabel.style.display = 'block';
                    tapHint.classList.remove('show');
                    returnMenuBtn.classList.remove('show');
                    choiceArea.innerHTML = '';
                    choiceArea.classList.remove('show');
                    awaitingChoice = false;

                    if (rightChar) {
                        var charFileName = CHARACTERS[rightChar] || null;
                        if (charFileName) {
                            var charUrl = getCharacterUrl(charFileName);
                            if (charUrl) {
                                characterRight.src = charUrl;
                                characterRight.classList.add('show');
                                characterRight.style.opacity = '1';
                                if (rightChar === 'yunling') {
                                    characterRight.style.transform = 'scaleX(1)';
                                } else if (rightChar === 'mukaska') {
                                    characterRight.style.transform = 'scaleX(1)';
                                    characterRight.style.width = '340px';
                                    characterRight.style.bottom = '18%';
                                } else {
                                    characterRight.style.transform = 'scaleX(-1)';
                                    characterRight.style.width = '280px';
                                    characterRight.style.bottom = '22%';
                                }
                            }
                        }
                    } else {
                        characterRight.classList.remove('show');
                        characterRight.style.opacity = '0';
                        characterRight.src = '';
                    }
                } else {
                    isAwakened = false;
                    storyBg.classList.remove('blur');
                    characterLayer.classList.remove('awaken');
                    characterLayer.style.opacity = '0';
                    characterRight.classList.remove('show');
                    characterRight.style.opacity = '0';
                    characterRight.src = '';
                    storyPanel.classList.remove('awaken');
                    speakerLabel.style.display = 'none';
                    tapHint.classList.add('show');
                    returnMenuBtn.classList.remove('show');
                    choiceArea.innerHTML = '';
                    choiceArea.classList.remove('show');
                    awaitingChoice = false;
                }

                storyLines.innerHTML = '';
                currentLine = 0;

                if (part.lines.length > 0) {
                    showLine(partIndex, 0);
                    currentLine = 1;
                }

                updateProgress();
                updateButtonState();
                storyPanel.scrollTop = storyPanel.scrollHeight;
            }

            function showLine(partIndex, lineIndex) {
                var part = CHAPTER_DATA[partIndex];
                if (!part) return;
                if (lineIndex >= part.lines.length) return;

                var text = part.lines[lineIndex];
                var speaker = null;
                var speakerType = null;

                if (text.indexOf('|') !== -1) {
                    var parts = text.split('|');
                    speaker = parts[0].trim();
                    text = parts.slice(1).join('|').trim();
                    speakerLabel.textContent = speaker;
                    speakerType = getSpeakerType(speaker);
                    if (speakerType === 'yandong') speakerLabel.style.color = 'rgba(150, 200, 255, 0.9)';
                    else if (speakerType === 'yunling') speakerLabel.style.color = 'rgba(200, 220, 255, 0.9)';
                    else if (speakerType === 'mukaska') speakerLabel.style.color = 'rgba(255, 100, 80, 0.9)';
                    else speakerLabel.style.color = 'rgba(255, 215, 150, 0.9)';
                } else if (part.isAwaken && !part.isDialogue) {
                    speakerLabel.textContent = '林小宁';
                    speakerLabel.style.color = 'rgba(255, 215, 150, 0.9)';
                }

                var div = document.createElement('div');
                div.className = 'story-line';
                if (speakerType === 'yandong') div.classList.add('speaker-yandong');
                else if (speakerType === 'yunling') div.classList.add('speaker-yunling');
                else if (speakerType === 'mukaska') div.classList.add('speaker-mukaska');
                div.textContent = text;
                storyLines.appendChild(div);

                requestAnimationFrame(function() { div.classList.add('show'); });
                storyPanel.scrollTop = storyPanel.scrollHeight;

                // 第6段选项
                if (partIndex === 5 && part.options) {
                    var isLastLine = (lineIndex === part.lines.length - 1);
                    if (isLastLine) {
                        setTimeout(function() {
                            showOptions(partIndex);
                        }, 600);
                    }
                }

                // 最后一段结束
                var isLastPart = (partIndex === CHAPTER_DATA.length - 1);
                var isLastLine = (lineIndex === part.lines.length - 1);
                if (isLastPart && isLastLine) {
                    setTimeout(function() {
                        returnMenuBtn.classList.add('show');
                        storyCtrlBtn.classList.remove('show');
                        tapHint.classList.remove('show');
                    }, 800);
                }
            }

            // ============================================================
            //  选项处理 (第6段)
            // ============================================================
            function showOptions(partIndex) {
                var part = CHAPTER_DATA[partIndex];
                if (!part || !part.options) return;
                storyCtrlBtn.classList.remove('show');
                tapHint.classList.remove('show');
                choiceArea.innerHTML = '';
                choiceArea.classList.add('show');
                part.options.forEach(function(opt) {
                    var btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.textContent = opt.text;
                    btn.addEventListener('click', function(e) {
                        e.stopPropagation();
                        handleChoice(partIndex, opt.nextLine);
                    });
                    choiceArea.appendChild(btn);
                });
                awaitingChoice = true;
                storyPanel.scrollTop = storyPanel.scrollHeight;
            }

            function handleChoice(partIndex, nextLine) {
                if (!awaitingChoice) return;
                awaitingChoice = false;
                choiceArea.classList.remove('show');
                choiceArea.innerHTML = '';

                var div = document.createElement('div');
                div.className = 'story-line';
                div.textContent = nextLine;
                storyLines.appendChild(div);
                requestAnimationFrame(function() { div.classList.add('show'); });
                storyPanel.scrollTop = storyPanel.scrollHeight;

                setTimeout(function() {
                    currentPart = 6;
                    currentLine = 0;
                    showPart(currentPart);
                    updateButtonState();
                    updateProgress();
                }, 600);
            }

            // ============================================================
            //  handleContinue
            // ============================================================
            function handleContinue() {
                if (!storyActive) return;
                if (awaitingChoice) return;
                if (isInBattle) return;

                var part = CHAPTER_DATA[currentPart];
                if (!part) return;

                if (currentLine >= part.lines.length) {
                    if (part.isBattle) return;
                    if (currentPart >= CHAPTER_DATA.length - 1) return;
                    currentPart++;
                    currentLine = 0;
                    showPart(currentPart);
                    updateButtonState();
                    updateProgress();
                    return;
                }

                showLine(currentPart, currentLine);
                currentLine++;
                updateButtonState();
                updateProgress();
            }

            function updateButtonState() {
                var part = CHAPTER_DATA[currentPart];
                if (!part) {
                    storyCtrlBtn.classList.remove('show');
                    return;
                }
                var allShown = (currentLine >= part.lines.length);
                if (part.isBattle) {
                    storyCtrlBtn.classList.remove('show');
                    return;
                }
                if (allShown) {
                    if (currentPart >= CHAPTER_DATA.length - 1) {
                        storyCtrlBtn.classList.remove('show');
                    } else {
                        storyCtrlBtn.textContent = '下一章 →';
                        storyCtrlBtn.classList.add('next-chapter');
                        storyCtrlBtn.classList.add('show');
                    }
                } else {
                    storyCtrlBtn.textContent = '继续 →';
                    storyCtrlBtn.classList.remove('next-chapter');
                    storyCtrlBtn.classList.add('show');
                }
            }

            function updateProgress() {
                var total = CHAPTER_DATA.length;
                var current = currentPart + 1;
                var part = CHAPTER_DATA[currentPart];
                if (part) {
                    var totalLines = part.lines.length;
                    var shown = Math.min(currentLine, totalLines);
                    storyProgress.textContent = current + ' / ' + total + '  ·  ' + shown + '/' + totalLines;
                } else {
                    storyProgress.textContent = current + ' / ' + total;
                }
            }

            // ============================================================
            //  战斗系统 (与之前相同，完整保留)
            // ============================================================
            function startBattle() {
                isInBattle = true;
                storyActive = false;
                battleContainer.classList.add('show');
                playBattleMusic();

                battleState = {
                    allies: BATTLE_DATA.allies.map(function(a) { return { ...a, hp: a.maxHp, shield: 0 }; }),
                    enemy: { ...BATTLE_DATA.enemy, hp: BATTLE_DATA.enemy.maxHp, shield: 0 },
                    deck: shuffle([].concat(BATTLE_DATA.cards)),
                    hand: [],
                    turn: 0,
                    phase: 'select'
                };
                selectedAlly = null;
                battleLocked = false;

                var bgUrl = getImageUrl(9);
                if (bgUrl) {
                    battleBg.style.backgroundImage = 'url("' + bgUrl + '")';
                } else {
                    battleBg.style.backgroundImage = 'linear-gradient(145deg, #1a2233, #0b0e14)';
                }

                renderBattleUI();
                battleLog.textContent = '⚔️ 姆卡斯卡精灵兽出现了！选择一名角色应战。';
                battleHint.textContent = '👆 点击选择一名角色';
                battleEndTurn.disabled = true;

                drawCards(4);
                renderHand();
                battleState.phase = 'select';
            }

            function drawCards(count) {
                var deck = battleState.deck;
                for (var i = 0; i < count; i++) {
                    if (deck.length === 0) {
                        battleState.deck = shuffle([].concat(BATTLE_DATA.cards));
                    }
                    if (battleState.deck.length > 0) {
                        var card = battleState.deck.pop();
                        battleState.hand.push(card);
                    }
                }
                if (battleState.hand.length > 6) {
                    battleState.hand = battleState.hand.slice(0, 6);
                }
            }

            function renderBattleUI() {
                battleAllies.innerHTML = '';
                battleState.allies.forEach(function(ally, idx) {
                    var unit = document.createElement('div');
                    unit.className = 'battle-unit selectable';
                    unit.dataset.idx = idx;
                    var hpPct = (ally.hp / ally.maxHp * 100);
                    var hpClass = hpPct < 30 ? 'low' : '';
                    var shieldText = ally.shield > 0 ? ' 🛡️' + ally.shield : '';
                    var avatarUrl = getAvatarUrl(ally.icon);
                    unit.innerHTML =
                        `
                        <div style="display:flex;align-items:center;gap:6px;">
                            <img src="${avatarUrl || ''}" style="width:32px;height:32px;border-radius:50%;object-fit:cover;border:2px solid rgba(255,255,255,0.1);" />
                            <div>
                                <div class="unit-name">${ally.name}</div>
                                <div class="unit-hp">❤️ ${ally.hp}/${ally.maxHp}${shieldText}
                                    <span class="hp-bar"><span class="hp-fill ${hpClass}" style="width:${hpPct}%"></span></span>
                                </div>
                            </div>
                        </div>
                    `;
                    if (ally.hp <= 0) {
                        unit.style.opacity = '0.3';
                        unit.classList.remove('selectable');
                    }
                    if (selectedAlly === idx) {
                        unit.classList.add('selected');
                    }
                    unit.addEventListener('click', function() {
                        if (battleLocked) return;
                        if (battleState.phase !== 'select') return;
                        if (battleState.allies[idx].hp <= 0) return;
                        selectAlly(idx);
                    });
                    battleAllies.appendChild(unit);
                });

                var enemy = battleState.enemy;
                var eHpPct = (enemy.hp / enemy.maxHp * 100);
                var eHpClass = eHpPct < 30 ? 'low' : '';
                var eShieldText = enemy.shield > 0 ? ' 🛡️' + enemy.shield : '';
                var enemyAvatar = getAvatarUrl(enemy.icon);
                battleEnemy.innerHTML =
                    `
                    <div class="battle-unit enemy-unit" style="text-align:left;">
                        <div style="display:flex;align-items:center;gap:6px;">
                            <img src="${enemyAvatar || ''}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;border:2px solid #ff6b6b;" />
                            <div>
                                <div class="unit-name">👹 ${enemy.name}</div>
                                <div class="unit-hp">❤️ ${enemy.hp}/${enemy.maxHp}${eShieldText}
                                    <span class="hp-bar"><span class="hp-fill enemy-hp ${eHpClass}" style="width:${eHpPct}%"></span></span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }

            function renderHand() {
                battleHand.innerHTML = '';
                if (battleState.hand.length === 0) {
                    battleHand.innerHTML =
                        '<div style="color:rgba(255,255,255,0.2);font-size:14px;letter-spacing:2px;">— 手牌已空 —</div>';
                    return;
                }
                battleState.hand.forEach(function(card, idx) {
                    var btn = document.createElement('div');
                    btn.className = 'battle-card type-' + card.type;
                    if (battleState.phase !== 'card' || battleLocked) {
                        btn.classList.add('disabled');
                    }
                    var avatarUrl = getAvatarUrl(card.icon);
                    btn.innerHTML =
                        `
                        <img src="${avatarUrl || ''}" class="card-avatar" />
                        <div class="card-name">${card.name}</div>
                        <div class="card-desc">${card.desc || ''}</div>
                    `;
                    btn.addEventListener('click', function() {
                        if (battleLocked) return;
                        if (battleState.phase !== 'card') return;
                        playCard(idx);
                    });
                    battleHand.appendChild(btn);
                });
            }

            function selectAlly(idx) {
                if (battleState.allies[idx].hp <= 0) return;
                selectedAlly = idx;
                battleState.phase = 'card';
                battleHint.textContent = '🎴 选择一张卡牌 · ' + battleState.allies[idx].name;
                battleLog.textContent = '👉 选择 ' + battleState.allies[idx].name + ' 的卡牌';
                renderBattleUI();
                renderHand();
                battleEndTurn.disabled = true;
            }

            function playCard(idx) {
                if (battleLocked) return;
                if (selectedAlly === null) return;
                if (battleState.phase !== 'card') return;

                var card = battleState.hand[idx];
                if (!card) return;
                var ally = battleState.allies[selectedAlly];
                if (ally.hp <= 0) return;

                battleLocked = true;
                battleState.phase = 'enemy';

                storyScene.classList.add('battle-shake');
                characterLayer.classList.add('battle-sway');
                characterRight.classList.add('battle-sway');
                setTimeout(function() {
                    storyScene.classList.remove('battle-shake');
                    characterLayer.classList.remove('battle-sway');
                    characterRight.classList.remove('battle-sway');
                }, 1200);

                battleState.hand.splice(idx, 1);

                var logMsg = ally.name + ' 使用了「' + card.name + '」';
                var dmg = 0,
                    heal = 0,
                    shield = 0;

                if (card.type === 'attack' && card.damage) {
                    dmg = card.damage;
                    var enemy = battleState.enemy;
                    var actualDmg = Math.max(0, dmg - (enemy.shield || 0));
                    if (enemy.shield > 0) {
                        var absorbed = Math.min(enemy.shield, dmg);
                        enemy.shield -= absorbed;
                        logMsg += '，造成 ' + actualDmg + ' 点伤害 (护盾吸收 ' + absorbed + ')';
                    } else {
                        logMsg += '，造成 ' + actualDmg + ' 点伤害';
                    }
                    enemy.hp = Math.max(0, enemy.hp - actualDmg);
                } else if (card.type === 'defend' && card.shield) {
                    shield = card.shield;
                    ally.shield = (ally.shield || 0) + shield;
                    logMsg += '，获得 ' + shield + ' 点护盾';
                } else if (card.type === 'heal' && card.heal) {
                    heal = card.heal;
                    var actualHeal = Math.min(heal, ally.maxHp - ally.hp);
                    ally.hp = Math.min(ally.maxHp, ally.hp + heal);
                    logMsg += '，恢复 ' + actualHeal + ' 点生命';
                } else if (card.type === 'special') {
                    if (card.damage) {
                        var enemy2 = battleState.enemy;
                        var actualDmg2 = Math.max(0, card.damage - (enemy2.shield || 0));
                        if (enemy2.shield > 0) {
                            var absorbed2 = Math.min(enemy2.shield, card.damage);
                            enemy2.shield -= absorbed2;
                            logMsg += '，造成 ' + actualDmg2 + ' 点伤害 (护盾吸收 ' + absorbed2 + ')';
                        } else {
                            logMsg += '，造成 ' + actualDmg2 + ' 点伤害';
                        }
                        enemy2.hp = Math.max(0, enemy2.hp - actualDmg2);
                    }
                    if (card.heal) {
                        var actualHeal2 = Math.min(card.heal, ally.maxHp - ally.hp);
                        ally.hp = Math.min(ally.maxHp, ally.hp + card.heal);
                        logMsg += '，恢复 ' + actualHeal2 + ' 点生命';
                    }
                }

                battleLog.textContent = logMsg;
                renderBattleUI();

                if (battleState.enemy.hp <= 0) {
                    battleState.enemy.hp = 0;
                    renderBattleUI();
                    battleLog.textContent = '🎉 姆卡斯卡精灵兽被击败了！';
                    battleHint.textContent = '✨ 胜利！';
                    battleEndTurn.disabled = true;
                    battleLocked = true;
                    setTimeout(function() {
                        endBattle(true);
                    }, 2000);
                    return;
                }

                setTimeout(function() {
                    enemyTurn();
                }, 800);
            }

            function enemyTurn() {
                var enemy = battleState.enemy;
                if (enemy.hp <= 0) {
                    endBattle(true);
                    return;
                }

                var aliveAllies = battleState.allies.filter(function(a) { return a.hp > 0; });
                if (aliveAllies.length === 0) {
                    endBattle(false);
                    return;
                }
                var target = aliveAllies[Math.floor(Math.random() * aliveAllies.length)];
                var baseDmg = enemy.attack + Math.floor(Math.random() * 3) - 1;
                var actualDmg = Math.max(2, baseDmg);
                if (target.shield > 0) {
                    var absorbed = Math.min(target.shield, actualDmg);
                    target.shield -= absorbed;
                    actualDmg -= absorbed;
                    if (target.shield < 0) target.shield = 0;
                }
                target.hp = Math.max(0, target.hp - actualDmg);

                storyScene.classList.add('battle-shake');
                characterLayer.classList.add('battle-sway');
                characterRight.classList.add('battle-sway');
                setTimeout(function() {
                    storyScene.classList.remove('battle-shake');
                    characterLayer.classList.remove('battle-sway');
                    characterRight.classList.remove('battle-sway');
                }, 1200);

                battleLog.textContent = '👹 姆卡斯卡精灵兽攻击 ' + target.name + '，造成 ' + actualDmg + ' 点伤害';
                renderBattleUI();

                var alive = battleState.allies.filter(function(a) { return a.hp > 0; });
                if (alive.length === 0) {
                    battleLog.textContent = '💔 全员倒下...';
                    battleHint.textContent = '💀 败北...';
                    battleEndTurn.disabled = true;
                    battleLocked = true;
                    setTimeout(function() {
                        endBattle(false);
                    }, 2000);
                    return;
                }

                drawCards(2);
                selectedAlly = null;
                battleState.phase = 'select';
                battleLocked = false;
                battleHint.textContent = '👆 点击选择一名角色';
                battleEndTurn.disabled = true;
                renderBattleUI();
                renderHand();

                if (battleState.hand.length === 0) {
                    drawCards(3);
                    renderHand();
                }
            }

            function endBattle(victory) {
                isInBattle = false;
                battleContainer.classList.remove('show');
                battleLocked = true;

                playGameMusic();

                if (victory) {
                    storyLines.innerHTML = '';
                    var lines = [
                        '🎉 姆卡斯卡精灵兽被击退了！白墨瑟尔城暂时安全了。',
                        '林小宁|我们做到了……大家一起。',
                        '云翎|这就是「守护」的力量。你们都是这座城的希望。'
                    ];
                    lines.forEach(function(text, i) {
                        var div = document.createElement('div');
                        div.className = 'story-line';
                        div.textContent = text;
                        storyLines.appendChild(div);
                        setTimeout(function() {
                            requestAnimationFrame(function() { div.classList.add('show'); });
                        }, i * 500);
                    });
                    setTimeout(function() {
                        returnMenuBtn.classList.add('show');
                        storyCtrlBtn.classList.remove('show');
                        tapHint.classList.remove('show');
                        storyProgress.textContent = '10 / 10  ·  完';
                    }, lines.length * 500 + 500);
                } else {
                    storyLines.innerHTML = '';
                    var div = document.createElement('div');
                    div.className = 'story-line';
                    div.textContent = '💔 被击败了……但故事不会结束。';
                    storyLines.appendChild(div);
                    requestAnimationFrame(function() { div.classList.add('show'); });
                    setTimeout(function() {
                        returnMenuBtn.classList.add('show');
                        storyCtrlBtn.classList.remove('show');
                        tapHint.classList.remove('show');
                        storyProgress.textContent = '10 / 10  ·  败';
                    }, 1500);
                }
                storyActive = false;
                currentPart = 9;
                storyPanel.scrollTop = storyPanel.scrollHeight;
            }

            // ============================================================
            //  事件绑定
            // ============================================================
            storyPanel.addEventListener('click', function(e) {
                if (e.target.closest('#story-ctrl-btn')) return;
                if (e.target.closest('#return-menu-btn')) return;
                if (e.target.closest('.choice-btn')) return;
                if (awaitingChoice) return;
                if (isInBattle) return;
                handleContinue();
            });

            storyCtrlBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (isInBattle) return;
                handleContinue();
            });

            returnMenuBtn.addEventListener('click', function() {
                stopAllAudio();
                window.location.href = 'index.html?from=chapter';
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    if (storyActive && !awaitingChoice && !isInBattle) {
                        handleContinue();
                    }
                }
                if (e.key === 'Enter') {
                    if (returnMenuBtn.classList.contains('show')) {
                        returnMenuBtn.click();
                    }
                }
            });

            // ============================================================
            //  初始化
            // ============================================================
            console.log('🌙 第一章 · 觉醒 · 古城 (修复版)');
            console.log('📸 图片目录: photo/');
            console.log('💡 图片加载失败时自动使用纯色背景');

            initAudio();

            preloadImages().then(function() {
                startStory();
            });

            setTimeout(function() {
                if (!storyActive) {
                    console.warn('图片加载超时，强制启动');
                    startStory();
                }
            }, 5000);

        })();
    </script>
</body>
</html>
