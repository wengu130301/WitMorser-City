<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>第四章 · 梦醒时分</title>
    <style>
        /* ============================================================
                   完整样式
                   ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Noto Serif SC', 'PingFang SC', 'Microsoft YaHei', serif;
            background: #0b0e14;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        #story-scene {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 800;
            background: #0b0e14;
            opacity: 1;
            visibility: visible;
        }
        #story-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 0.8s ease, filter 1s ease;
            opacity: 0;
            z-index: 0;
            background-color: #0b0e14;
        }
        #story-bg.loaded {
            opacity: 1;
        }
        #story-bg.blur {
            filter: blur(8px);
        }
        #character-layer {
            position: absolute;
            bottom: 20%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
            width: 260px;
            max-height: 60%;
            object-fit: contain;
            pointer-events: none;
            opacity: 0;
            transition: left 1s ease, bottom 1s ease, opacity 1.2s ease;
            animation: none;
        }
        #character-layer.loaded {
            opacity: 0.85;
            animation: floatCharacter 3.5s ease-in-out infinite;
        }
        #character-layer.awaken {
            left: 3% !important;
            transform: translateX(0) !important;
            bottom: 18%;
            width: 320px;
            opacity: 0.95;
            animation: floatCharacterLeft 3.5s ease-in-out infinite;
        }
        @keyframes floatCharacter {
            0%,
            100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(-10px);
            }
        }
        @keyframes floatCharacterLeft {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }
        #character-layer-right {
            position: absolute;
            bottom: 22%;
            right: 3%;
            z-index: 1;
            width: 280px;
            max-height: 55%;
            object-fit: contain;
            pointer-events: none;
            opacity: 0;
            transition: opacity 1.2s ease;
            animation: none;
            transform: scaleX(-1) translateX(0);
        }
        #character-layer-right.show {
            opacity: 0.9;
            animation: floatCharacterRight 3.5s ease-in-out infinite;
        }
        @keyframes floatCharacterRight {
            0%,
            100% {
                transform: scaleX(-1) translateY(0);
            }
            50% {
                transform: scaleX(-1) translateY(-10px);
            }
        }
        #story-scene::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 60%;
            background: linear-gradient(to top, rgba(10, 14, 26, 0.78) 0%, transparent 100%);
            pointer-events: none;
            z-index: 1;
        }
        #story-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 30px 28px 50px 28px;
            z-index: 2;
            max-height: 55%;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(255, 255, 255, 0.15) transparent;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            cursor: pointer;
            transition: all 0.8s ease;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(4px);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }
        #story-panel::-webkit-scrollbar {
            width: 3px;
        }
        #story-panel::-webkit-scrollbar-track {
            background: transparent;
        }
        #story-panel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px;
        }
        #story-panel.awaken {
            background: rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(4px);
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px 28px 30px 28px;
            max-height: 45%;
        }
        #speaker-label {
            display: none;
            font-size: 14px;
            font-weight: 600;
            color: rgba(255, 215, 150, 0.9);
            letter-spacing: 2px;
            margin-bottom: 4px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.6);
            transition: color 0.3s ease;
        }
        #story-panel.awaken #speaker-label {
            display: block;
        }
        #story-panel.awaken .story-line {
            background: rgba(255, 255, 255, 0.08);
            padding: 8px 16px;
            border-radius: 12px;
            border-left: 3px solid rgba(255, 215, 150, 0.3);
            margin-bottom: 2px;
            backdrop-filter: blur(2px);
        }
        #story-panel.awaken .story-line.show {
            background: rgba(255, 255, 255, 0.12);
        }
        #story-panel.awaken .story-line.speaker-yandong {
            border-left-color: rgba(150, 200, 255, 0.5);
        }
        #story-panel.awaken .story-line.speaker-yunling {
            border-left-color: rgba(200, 220, 255, 0.6);
        }
        #story-panel.awaken .story-line.speaker-zhenni {
            border-left-color: #ffb8a0;
        }
        #story-panel.awaken .story-line.speaker-shaya {
            border-left-color: #ff8a65;
        }
        #story-panel.awaken .story-line.speaker-mukaska {
            border-left-color: #ff6b6b;
        }
        #story-panel.awaken .story-line.speaker-xiaopang {
            border-left-color: #ff6b6b;
        }
        #story-panel.awaken .story-line.speaker-mother {
            border-left-color: #a0d0ff;
        }
        #story-panel.awaken .story-line.speaker-father {
            border-left-color: #b8a0d0;
        }
        #story-panel.awaken .story-line.speaker-teacher {
            border-left-color: #80d0a0;
        }
        #story-panel.awaken .story-line.speaker-xiaochen {
            border-left-color: #80b0d0;
        }
        #story-panel.awaken .story-line.speaker-xiaoyu {
            border-left-color: #ffb8d0;
        }
        #story-panel.awaken .story-line.speaker-wang {
            border-left-color: #d0b080;
        }
        #story-chapter-label {
            font-size: 12px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.4);
        }
        #story-lines {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-height: 60px;
        }
        .story-line {
            font-size: 17px;
            line-height: 1.9;
            color: rgba(255, 255, 255, 0.92);
            text-shadow: 0 2px 16px rgba(0, 0, 0, 0.6);
            opacity: 0;
            transform: translateY(6px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            letter-spacing: 0.5px;
            font-weight: 400;
            padding: 2px 0;
        }
        .story-line.show {
            opacity: 1;
            transform: translateY(0);
        }
        #choice-area {
            display: none;
            flex-direction: column;
            gap: 10px;
            margin-top: 12px;
        }
        #choice-area.show {
            display: flex;
        }
        .choice-btn {
            padding: 10px 20px;
            border: 1px solid rgba(255, 215, 150, 0.3);
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(4px);
            color: rgba(255, 255, 255, 0.85);
            font-size: 16px;
            font-family: 'Noto Serif SC', serif;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            text-align: center;
        }
        .choice-btn:hover {
            background: rgba(255, 215, 150, 0.15);
            border-color: rgba(255, 215, 150, 0.6);
            transform: scale(1.02);
        }
        #story-footer {
            position: absolute;
            bottom: 16px;
            left: 0;
            width: 100%;
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            padding: 0 20px;
            pointer-events: none;
        }
        #story-progress {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 2px;
            font-weight: 300;
            pointer-events: none;
        }
        #story-ctrl-btn {
            pointer-events: auto;
            padding: 7px 28px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(8px);
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-family: 'Noto Serif SC', serif;
            cursor: pointer;
            transition: all 0.4s ease;
            letter-spacing: 2px;
            opacity: 0;
            visibility: hidden;
        }
        #story-ctrl-btn.show {
            opacity: 1;
            visibility: visible;
        }
        #story-ctrl-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
        }
        #story-ctrl-btn.next-chapter {
            color: rgba(255, 215, 150, 0.7);
            border-color: rgba(255, 215, 150, 0.2);
        }
        #transition-tip {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 5;
            color: rgba(255, 255, 255, 0.6);
            font-size: 18px;
            letter-spacing: 4px;
            text-shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
            background: rgba(0, 0, 0, 0.3);
            padding: 16px 32px;
            border-radius: 12px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            pointer-events: none;
            animation: fadeInOut 2s ease forwards;
        }
        #transition-tip.show {
            display: block;
        }
        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.95);
            }
            20% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            80% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.95);
            }
        }
        #return-menu-btn {
            display: none;
            pointer-events: auto;
            padding: 10px 36px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(8px);
            color: rgba(255, 255, 255, 0.6);
            font-size: 15px;
            font-family: 'Noto Serif SC', serif;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 3px;
            margin-top: 12px;
        }
        #return-menu-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.4);
            color: #fff;
            transform: scale(1.04);
        }
        #return-menu-btn.show {
            display: inline-block;
        }
        #tap-hint {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 2px;
            font-weight: 300;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.6s ease;
            margin-top: 4px;
        }
        #tap-hint.show {
            opacity: 1;
        }

        /* 震动 */
        @keyframes shakeScene {
            0%,
            100% {
                transform: translate(0, 0) rotate(0deg);
            }
            10% {
                transform: translate(-8px, 4px) rotate(-0.5deg);
            }
            20% {
                transform: translate(6px, -6px) rotate(0.5deg);
            }
            30% {
                transform: translate(-4px, 8px) rotate(-0.3deg);
            }
            40% {
                transform: translate(10px, -2px) rotate(0.4deg);
            }
            50% {
                transform: translate(-6px, 6px) rotate(-0.6deg);
            }
            60% {
                transform: translate(4px, -4px) rotate(0.3deg);
            }
            70% {
                transform: translate(-10px, 2px) rotate(-0.2deg);
            }
            80% {
                transform: translate(8px, -8px) rotate(0.5deg);
            }
            90% {
                transform: translate(-2px, 10px) rotate(-0.4deg);
            }
        }
        #story-scene.shaking {
            animation: shakeScene 0.6s ease-in-out 3;
        }
        #story-scene.shaking-strong {
            animation: shakeScene 0.4s ease-in-out 5;
        }
        @keyframes swayChar {
            0%,
            100% {
                transform: translateX(0) rotate(0deg);
            }
            25% {
                transform: translateX(-6px) rotate(-2deg);
            }
            75% {
                transform: translateX(6px) rotate(2deg);
            }
        }
        #character-layer.swaying {
            animation: swayChar 0.5s ease-in-out 4;
        }
        #character-layer-right.swaying {
            animation: swayChar 0.5s ease-in-out 4;
        }

        /* 死亡转场动画 */
        #death-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 999;
            pointer-events: none;
            opacity: 0;
            background: #000;
            transition: none;
        }
        #death-overlay.active {
            animation: deathBlink 3.5s ease-in-out forwards;
        }
        @keyframes deathBlink {
            0% {
                opacity: 0;
                clip-path: inset(0 0 0 0);
            }
            10% {
                opacity: 0;
                clip-path: inset(0 0 0 0);
            }
            15% {
                opacity: 1;
                clip-path: inset(0 0 0 0);
            }
            50% {
                opacity: 1;
                clip-path: inset(0 0 0 0);
            }
            55% {
                opacity: 1;
                clip-path: inset(100% 0 0 0);
            }
            60% {
                opacity: 1;
                clip-path: inset(100% 0 0 0);
            }
            100% {
                opacity: 0;
                clip-path: inset(100% 0 0 0);
            }
        }
        #death-overlay .dots {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.3);
            font-size: 28px;
            letter-spacing: 12px;
            opacity: 0;
            animation: dotsAppear 1.2s ease 1.5s forwards;
        }
        @keyframes dotsAppear {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        /* 战斗系统 */
        #battle-container {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(2px);
            flex-direction: column;
            padding: 10px 16px 20px 16px;
        }
        #battle-container.show {
            display: flex;
        }
        #battle-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0.4;
            z-index: -1;
        }
        #battle-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 8px;
            flex-wrap: wrap;
            padding: 4px 0;
            z-index: 2;
            flex-shrink: 0;
        }
        #battle-allies {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            flex: 2;
            min-width: 200px;
        }
        #battle-enemy {
            flex: 1;
            min-width: 100px;
            text-align: right;
        }
        .battle-unit {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            border-radius: 10px;
            padding: 6px 10px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            min-width: 70px;
            flex: 1;
            max-width: 140px;
            transition: all 0.3s ease;
            cursor: default;
        }
        .battle-unit.selectable {
            cursor: pointer;
            border-color: rgba(255, 215, 150, 0.2);
        }
        .battle-unit.selectable:hover {
            background: rgba(255, 215, 150, 0.12);
            border-color: rgba(255, 215, 150, 0.4);
            transform: scale(1.02);
        }
        .battle-unit.selected {
            background: rgba(255, 215, 150, 0.18);
            border-color: rgba(255, 215, 150, 0.6);
            box-shadow: 0 0 20px rgba(255, 215, 150, 0.1);
        }
        .battle-unit .unit-name {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: 1px;
        }
        .battle-unit .unit-hp {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 2px;
        }
        .battle-unit .unit-hp .hp-bar {
            display: inline-block;
            width: 50px;
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            vertical-align: middle;
            margin-left: 4px;
        }
        .battle-unit .unit-hp .hp-bar .hp-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
            background: linear-gradient(90deg, #6bcb8a, #4ecdc4);
        }
        .battle-unit .unit-hp .hp-bar .hp-fill.low {
            background: linear-gradient(90deg, #ff6b6b, #ee5a24);
        }
        .battle-unit .unit-hp .hp-bar .hp-fill.enemy-hp {
            background: linear-gradient(90deg, #ff6b6b, #d63031);
        }
        .battle-unit.enemy-unit {
            border-color: rgba(255, 80, 80, 0.2);
            background: rgba(80, 0, 0, 0.25);
        }
        .battle-unit.enemy-unit .unit-name {
            color: rgba(255, 150, 150, 0.9);
        }
        #battle-middle {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            z-index: 2;
            min-height: 100px;
            padding: 6px 0;
        }
        #battle-hand {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
            padding: 8px 0;
        }
        .battle-card {
            padding: 8px 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(6px);
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 80px;
            max-width: 120px;
            flex: 1;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            font-family: 'Noto Serif SC', serif;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .battle-card .card-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid rgba(255, 255, 255, 0.15);
            background: #1a2233;
        }
        .battle-card .card-name {
            font-weight: 600;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.9);
        }
        .battle-card .card-desc {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
        }
        .battle-card.type-attack .card-avatar {
            border-color: #ff6b6b;
        }
        .battle-card.type-defend .card-avatar {
            border-color: #4ecdc4;
        }
        .battle-card.type-heal .card-avatar {
            border-color: #6bcb8a;
        }
        .battle-card.type-special .card-avatar {
            border-color: #feca57;
        }
        .battle-card:hover:not(.disabled) {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 215, 150, 0.3);
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.3);
        }
        .battle-card.disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none !important;
        }
        #battle-log-area {
            z-index: 2;
            padding: 4px 8px;
            text-align: center;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            min-height: 28px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            backdrop-filter: blur(4px);
            margin-top: 4px;
            flex-shrink: 0;
        }
        #battle-bottom {
            display: flex;
            justify-content: center;
            gap: 12px;
            z-index: 2;
            padding: 6px 0;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        #battle-bottom .battle-action-btn {
            padding: 8px 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(6px);
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
            font-family: 'Noto Serif SC', serif;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
        }
        #battle-bottom .battle-action-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
        }
        #battle-bottom .battle-action-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        #battle-select-hint {
            color: rgba(255, 255, 255, 0.25);
            font-size: 13px;
            letter-spacing: 2px;
            text-align: center;
            padding: 4px 0;
            z-index: 2;
        }
        @keyframes battleShake {
            0%,
            100% {
                transform: translate(0, 0);
            }
            10% {
                transform: translate(-6px, 4px);
            }
            20% {
                transform: translate(6px, -4px);
            }
            30% {
                transform: translate(-4px, 6px);
            }
            40% {
                transform: translate(4px, -6px);
            }
            50% {

            var imageLoadCache = {};

            function preloadImages() {
                var promises = [];
                for (var i = 1; i <= 40; i++) {
                    var url = PHOTO_PREFIX + String(i).padStart(3, '0') + '.png';
                    promises.push(new Promise(function(resolve) {
                        var img = new Image();
                        img.onload = function() {
                            imageLoadCache[url] = true;
                            resolve({ url: url, loaded: true });
                        };
                        img.onerror = function() {
                            imageLoadCache[url] = false;
                            resolve({ url: url, loaded: false });
                        };
                        img.src = url;
                    }));
                }
                var charFiles = ['lin_xiaoning.png', 'yandong.png', 'yunling.png', 'zhenni.png', 'shaya.png',
                    'mukaska.png', 'nan.png',
                    'mm.png', 'bb.png', 'lin.png', 'chen.png', 'yu.png', 'xiaopang.png', 'aqiang.png', 'ali.png',
                    'wang.png'
                ];
                charFiles.forEach(function(file) {
                    var url = CHARACTER_DIR + file;
                    promises.push(new Promise(function(resolve) {
                        var img = new Image();
                        img.onload = function() {
                            resolve({ url: url, loaded: true, type: 'character' });
                        };
                        img.onerror = function() {
                            resolve({ url: url, loaded: false, type: 'character' });
                        };
                        img.src = url;
                    }));
                });
                return Promise.all(promises).then(function(results) {
                    allImagesLoaded = results.filter(function(r) { return r.loaded; });
                    return allImagesLoaded;
                });
            }

            function getImageUrl(partIdx) {
                var imgNum = CHAPTER_DATA[partIdx] ? CHAPTER_DATA[partIdx].img : 1;
                if (!imgNum || imgNum < 1) imgNum = 1;
                if (imgNum > 40) imgNum = 40;
                var padded = String(imgNum).padStart(3, '0');
                return PHOTO_PREFIX + padded + '.png';
            }

            function loadBackgroundSmart(url, callback) {
                if (backgroundLoading[url]) {
                    setTimeout(function() { loadBackgroundSmart(url, callback); }, 200);
                    return;
                }
                if (imageLoadCache[url] === true) {
                    callback(true);
                    return;
                }
                backgroundLoading[url] = true;
                var img = new Image();
                img.onload = function() {
                    imageLoadCache[url] = true;
                    backgroundLoading[url] = false;
                    callback(true);
                };
                img.onerror = function() {
                    imageLoadCache[url] = false;
                    backgroundLoading[url] = false;
                    callback(false);
                };
                img.src = url;
            }

            function getCharacterUrl(fileName) {
                var url = CHARACTER_DIR + fileName;
                var found = allImagesLoaded.find(function(r) { return r.url === url && r.loaded; });

            function triggerDeathTransition() {
                if (deathTriggered) return;
                deathTriggered = true;
                storyActive = false;

                // 播放闹钟声
                try {
                    var ctx = new(window.AudioContext || window.webkitAudioContext)();
                    var osc = ctx.createOscillator();
                    var gain = ctx.createGain();
                    osc.type = 'square';
                    osc.frequency.value = 800;
                    gain.gain.value = 0.15;
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1.2);
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.start(ctx.currentTime);
                    osc.stop(ctx.currentTime + 1.2);
                    var osc2 = ctx.createOscillator();
                    var gain2 = ctx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.value = 1200;
                    gain2.gain.value = 0.08;
                    gain2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
                    osc2.connect(gain2);
                    gain2.connect(ctx.destination);
                    osc2.start(ctx.currentTime + 1.0);
                    osc2.stop(ctx.currentTime + 1.6);
                } catch (e) {}

                // 先显示文字，再启动遮罩动画
                storyLines.innerHTML = '';
                var idx = 0;

                function showNextDeathText() {
                    if (idx >= deathTexts.length) {
                        setTimeout(function() {
                            // 启动遮罩动画
                            deathOverlay.classList.add('active');
                            setTimeout(function() {

                        return;

                    var div = document.createElement('div');

                    storyLines.appendChild(div);
                    requestAnimationFrame(function() { div.classList.add('show'); });
                    storyPanel.scrollTop = storyPanel.scrollHeight;
                    idx++;
                    setTimeout(showNextDeathText, 700);
                }

            }

                    currentPart++;

                    if (currentPart >= CHAPTER_DATA.length - 1) {
                        storyCtrlBtn.classList.remove('show');
                    } else {
                        storyCtrlBtn.textContent = '下一章 →';
                        storyCtrlBtn.classList.add('next-chapter');
                        storyCtrlBtn.classList.add('show');

                } else {
                    storyCtrlBtn.textContent = '继续 →';
                    storyCtrlBtn.classList.remove('next-chapter');
                    storyCtrlBtn.classList.add('show');
                }

            function updateProgress() {
                var total = CHAPTER_DATA.length;
                var current = currentPart + 1;
                var part = CHAPTER_DATA[currentPart];
                if (part) {
                    var totalLines = part.lines.length;
                    var shown = Math.min(currentLine, totalLines);
                    storyProgress.textContent = current + ' / ' + total + '  ·  ' + shown + '/' + totalLines;

            function renderBattleUI() {

                    unit.innerHTML =
                        `

                                </div>
                            </div>
                        </div>

            function playDesertCard(idx) {
                if (battleLocked) return;
                if (selectedAlly === null) return;
                if (battleState.phase !== 'card') return;

                var card = battleState.hand[idx];
                if (!card) return;
                var ally = battleState.allies[selectedAlly];
                if (ally.hp <= 0) return;

                battleLocked = true;
                battleState.phase = 'enemy';

                storyScene.classList.add('battle-shake');
                characterLayer.classList.add('battle-sway');
                characterRight.classList.add('battle-sway');
                setTimeout(function() {
                    storyScene.classList.remove('battle-shake');
                    characterLayer.classList.remove('battle-sway');
                    characterRight.classList.remove('battle-sway');
                }, 1200);

                battleState.hand.splice(idx, 1);

                var logMsg = ally.name + ' 使用了「' + card.name + '」';
                var dmg = 0,
                    heal = 0,
                    shield = 0;

                if (card.type === 'attack' && card.damage) {
                    dmg = card.damage;
                    var enemy = battleState.enemy;
                    var actualDmg = Math.max(0, dmg - (enemy.shield || 0));
                    if (enemy.shield > 0) {
                        var absorbed = Math.min(enemy.shield, dmg);
                        enemy.shield -= absorbed;
                        logMsg += '，造成 ' + actualDmg + ' 点伤害 (护盾吸收 ' + absorbed + ')';
                    } else {
                        logMsg += '，造成 ' + actualDmg + ' 点伤害';
                    }
                    enemy.hp = Math.max(0, enemy.hp - actualDmg);
                } else if (card.type === 'defend' && card.shield) {
                    shield = card.shield;
                    ally.shield = (ally.shield || 0) + shield;
                    logMsg += '，获得 ' + shield + ' 点护盾';
                } else if (card.type === 'heal' && card.heal) {
                    heal = card.heal;
                    var actualHeal = Math.min(heal, ally.maxHp - ally.hp);
                    ally.hp = Math.min(ally.maxHp, ally.hp + heal);
                    logMsg += '，恢复 ' + actualHeal + ' 点生命';
                } else if (card.type === 'special') {
                    if (card.damage) {
                        var enemy2 = battleState.enemy;
                        var actualDmg2 = Math.max(0, card.damage - (enemy2.shield || 0));
                        if (enemy2.shield > 0) {
                            var absorbed2 = Math.min(enemy2.shield, card.damage);
                            enemy2.shield -= absorbed2;
                            logMsg += '，造成 ' + actualDmg2 + ' 点伤害 (护盾吸收 ' + absorbed2 + ')';
                        } else {
                            logMsg += '，造成 ' + actualDmg2 + ' 点伤害';
                        }
                        enemy2.hp = Math.max(0, enemy2.hp - actualDmg2);
                    }
                    if (card.heal) {
                        var actualHeal2 = Math.min(card.heal, ally.maxHp - ally.hp);
                        ally.hp = Math.min(ally.maxHp, ally.hp + card.heal);
                        logMsg += '，恢复 ' + actualHeal2 + ' 点生命';
                    }
                }

                battleLog.textContent = logMsg;
                renderBattleUI();

                battleState.turnCount = (battleState.turnCount || 0) + 1;

                if (battleState.enemy.hp <= 0) {
                    battleState.enemy.hp = 0;
                    renderBattleUI();
                    battleLog.textContent = '💥 姆卡斯卡被击倒了……但它又站了起来！';
                    battleHint.textContent = '⚠️ 它还在继续攻击！';
                    battleLocked = false;
                    battleState.phase = 'select';
                    selectedAlly = null;
                    battleEndTurn.disabled = true;

                    renderBattleUI();
                    setTimeout(function() {
                        enemyTurn();

                    return;
                }

                if (battleState.enemy.hp < 50 || battleState.turnCount > 3) {
                    battleLog.textContent = '💔 姆卡斯卡爆发了强大的力量……五人被击倒……';
                    battleHint.textContent = '💀 战败……';
                    battleEndTurn.disabled = true;
                    battleLocked = true;
                    setTimeout(function() {
                        endDesertBattle(false);
                    }, 1500);
                    return;
                }

                setTimeout(function() {
                    enemyTurn();
                }, 800);
            }

            function enemyTurn() {
                var enemy = battleState.enemy;
                if (enemy.hp <= 0) {
                    endDesertBattle(true);
                    return;
                }

                var aliveAllies = battleState.allies.filter(function(a) { return a.hp > 0; });
                if (aliveAllies.length === 0) {
                    endDesertBattle(false);
                    return;
                }
                var target = aliveAllies[Math.floor(Math.random() * aliveAllies.length)];
                var baseDmg = enemy.attack + Math.floor(Math.random() * 3) - 1;
                var actualDmg = Math.max(2, baseDmg);
                if (target.shield > 0) {
                    var absorbed = Math.min(target.shield, actualDmg);
                    target.shield -= absorbed;
                    actualDmg -= absorbed;
                    if (target.shield < 0) target.shield = 0;
                }
                target.hp = Math.max(0, target.hp - actualDmg);

                storyScene.classList.add('battle-shake');
                characterLayer.classList.add('battle-sway');
                characterRight.classList.add('battle-sway');
                setTimeout(function() {
                    storyScene.classList.remove('battle-shake');
                    characterLayer.classList.remove('battle-sway');
                    characterRight.classList.remove('battle-sway');
                }, 1200);

                battleLog.textContent = '👹 姆卡斯卡攻击 ' + target.name + '，造成 ' + actualDmg + ' 点伤害';
                renderBattleUI();

                var alive = battleState.allies.filter(function(a) { return a.hp > 0; });
                if (alive.length === 0) {
                    battleLog.textContent = '💔 全员倒下...';
                    battleHint.textContent = '💀 败北...';
                    battleEndTurn.disabled = true;
                    battleLocked = true;
                    setTimeout(function() {
                        endDesertBattle(false);
                    }, 1500);
                    return;
                }

                battleState.turnCount = (battleState.turnCount || 0) + 1;
                if (battleState.enemy.hp < 50 || battleState.turnCount > 3) {
                    battleLog.textContent = '💔 姆卡斯卡爆发了强大的力量……五人被击倒……';
                    battleHint.textContent = '💀 战败……';
                    battleEndTurn.disabled = true;
                    battleLocked = true;
                    setTimeout(function() {
                        endDesertBattle(false);
                    }, 1500);
                    return;
                }

                drawCardsDesert(2);
                selectedAlly = null;
                battleState.phase = 'select';
                battleLocked = false;
                battleHint.textContent = '👆 点击选择一名角色';
                battleEndTurn.disabled = true;
                renderBattleUI();
                renderHand();

                if (battleState.hand.length === 0) {
                    drawCardsDesert(3);
                    renderHand();
                }
            }

            function playRealCard(idx) {
                if (battleLocked) return;
                if (battleState.phase !== 'card') return;

                var card = battleState.hand[idx];
                if (!card) return;
                var ally = battleState.allies[0];
                if (ally.hp <= 0) return;

                battleLocked = true;
                battleState.phase = 'enemy';

                storyScene.classList.add('battle-shake');
                characterLayer.classList.add('battle-sway');
                setTimeout(function() {
                    storyScene.classList.remove('battle-shake');
                    characterLayer.classList.remove('battle-sway');
                }, 1200);

                battleState.hand.splice(idx, 1);

                var logMsg = ally.name + ' 使用了「' + card.name + '」';
                var dmg = 0,
                    heal = 0,
                    shield = 0;

                var targetEnemy = null;
                var minHp = 999;
                battleState.enemies.forEach(function(e) {
                    if (e.hp > 0 && e.hp < minHp) {
                        minHp = e.hp;
                        targetEnemy = e;
                    }
                });
                if (!targetEnemy) {
                    targetEnemy = battleState.enemies[0];
                }

                if (card.type === 'attack' && card.damage) {
                    dmg = card.damage;
                    var actualDmg = Math.max(0, dmg - (targetEnemy.shield || 0));
                    if (targetEnemy.shield > 0) {
                        var absorbed = Math.min(targetEnemy.shield, dmg);
                        targetEnemy.shield -= absorbed;
                        logMsg += '，对 ' + targetEnemy.name + ' 造成 ' + actualDmg + ' 点伤害 (护盾吸收 ' + absorbed +
                        ')';
                    } else {
                        logMsg += '，对 ' + targetEnemy.name + ' 造成 ' + actualDmg + ' 点伤害';
                    }
                    targetEnemy.hp = Math.max(0, targetEnemy.hp - actualDmg);
                } else if (card.type === 'defend' && card.shield) {
                    shield = card.shield;
                    ally.shield = (ally.shield || 0) + shield;
                    logMsg += '，获得 ' + shield + ' 点护盾';
                } else if (card.type === 'heal' && card.heal) {
                    heal = card.heal;
                    var actualHeal = Math.min(heal, ally.maxHp - ally.hp);
                    ally.hp = Math.min(ally.maxHp, ally.hp + heal);
                    logMsg += '，恢复 ' + actualHeal + ' 点生命';
                }

                battleLog.textContent = logMsg;
                renderRealBattleUI();

                var allDead = battleState.enemies.every(function(e) { return e.hp <= 0; });

                    battleLog.textContent = '🎉 小胖三人被打跑了！';

                    battleLocked = true;

                        endRealBattle(true);
                    }, 1500);
                    return;

                setTimeout(function() {
                    realEnemyTurn();
                }, 800);
            }

            function realEnemyTurn() {
                var aliveEnemies = battleState.enemies.filter(function(e) { return e.hp > 0; });
                if (aliveEnemies.length === 0) {
                    endRealBattle(true);
                    return;
                }

                var ally = battleState.allies[0];
                if (ally.hp <= 0) {
                    endRealBattle(false);
                    return;
                }

                aliveEnemies.forEach(function(enemy) {
                    if (ally.hp <= 0) return;
                    var baseDmg = enemy.attack + Math.floor(Math.random() * 2) - 1;
                    var actualDmg = Math.max(1, baseDmg);
                    if (ally.shield > 0) {
                        var absorbed = Math.min(ally.shield, actualDmg);
                        ally.shield -= absorbed;
                        actualDmg -= absorbed;
                        if (ally.shield < 0) ally.shield = 0;
                    }
                    ally.hp = Math.max(0, ally.hp - actualDmg);
                    battleLog.textContent = '👊 ' + enemy.name + ' 攻击，造成 ' + actualDmg + ' 点伤害';
                });

                renderRealBattleUI();

                if (ally.hp <= 0) {
                    battleLog.textContent = '💔 林小宁倒下了……';
                    battleHint.textContent = '💀 败北……';
                    battleEndTurn.disabled = true;
                    battleLocked = true;
                    setTimeout(function() {
                        endRealBattle(false);
                    }, 1500);
                    return;
                }

                drawCardsReal(1);
                battleLocked = false;
                battleState.phase = 'card';
                battleHint.textContent = '🎴 选择一张卡牌反击！';
                battleEndTurn.disabled = true;
                renderHand();

                if (battleState.hand.length === 0) {
                    drawCardsReal(2);
                    renderHand();
                }
            }

            function endRealBattle(victory) {
                isInBattle = false;
                battleContainer.classList.remove('show');
                battleLocked = true;

                playRealMusic();

                // 战斗结束后跳到下一个非战斗段落
                if (currentPart < CHAPTER_DATA.length - 1) {
                    var next = currentPart + 1;
                    while (next < CHAPTER_DATA.length && (CHAPTER_DATA[next].isBattle || CHAPTER_DATA[next].isBattleStart ||
                            CHAPTER_DATA[next].isBattleEnd)) {
                        next++;
                    }
                    if (next < CHAPTER_DATA.length) {
                        currentPart = next;
                    } else {
                        currentPart = CHAPTER_DATA.length - 1;
                    }
                    currentLine = 0;
                    storyActive = true;
                    showPart(currentPart);
                    updateButtonState();
                    updateProgress();
                }
            }

            // ============================================================
            //  事件绑定
            // ============================================================
            storyPanel.addEventListener('click', function(e) {
                if (e.target.closest('#story-ctrl-btn')) return;
                if (e.target.closest('#return-menu-btn')) return;
                if (e.target.closest('.choice-btn')) return;
                if (awaitingChoice) return;
                if (isInBattle) return;
                handleContinue();
            });

            storyCtrlBtn.addEventListener('click', function(e) {
                e.stopPropagation();
                if (isInBattle) return;
                handleContinue();
            });

            returnMenuBtn.addEventListener('click', function() {
                stopAllAudio();
                window.location.href = 'index.html?from=chapter';
            });

            document.addEventListener('keydown', function(e) {
                if (e.key === ' ' || e.key === 'Space') {
                    e.preventDefault();
                    if (storyActive && !awaitingChoice && !isInBattle) {
                        handleContinue();
                    }
                }
                if (e.key === 'Enter') {
                    if (returnMenuBtn.classList.contains('show')) {
                        returnMenuBtn.click();
                    }
                }
            });

            // ============================================================
            //  初始化
            // ============================================================
            console.log('🌙 第四章 · 梦醒时分 (40张图片完整版)');
            console.log('📸 图片: photo4/001.png ~ 040.png');
            console.log('🎵 沙漠: 005 | 沙漠战斗: 003 | 现实: 006 | 主殿: 007');
            console.log('✅ 按照40张图片索引表精确配置');

            initAudio();

            preloadImages().then(function() {
                startStory();
            });

            setTimeout(function() {
                if (!storyActive) {
                    console.warn('图片加载超时，强制启动');
                    startStory();
                }
            }, 5000);

        })();
    </script>
</body>
</html>
